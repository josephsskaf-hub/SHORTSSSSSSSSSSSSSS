<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShortsForgeAI — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --purple-dark: #5b21b6;
      --pink: #ec4899;
      --dark: #0f0f0f;
      --dark2: #1a1a2e;
      --dark3: #16213e;
      --card: #1e1e3f;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #2d2d5b;
      --error: #f87171;
      --success: #4ade80;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, var(--purple-light), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 1.1rem; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }

    /* MAIN */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 70%); }

    .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 440px; padding: 40px; }

    .auth-card h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    /* TABS */
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .tab-btn { flex: 1; background: none; border: none; color: var(--muted); font-size: 0.95rem; font-weight: 600; padding: 10px; cursor: pointer; transition: color .2s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab-btn.active { color: var(--purple-light); border-bottom-color: var(--purple-light); }

    /* FORMS */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    .form-group input { width: 100%; background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 0.95rem; transition: border-color .2s; outline: none; }
    .form-group input:focus { border-color: var(--purple); }
    .form-group input.error-field { border-color: var(--error); }

    .btn-primary { width: 100%; background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; border: none; border-radius: 10px; padding: 13px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: opacity .2s, transform .1s; margin-top: 8px; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg { padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; margin-bottom: 16px; display: none; }
    .msg.error { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); display: block; }
    .msg.success { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--success); display: block; }

    .text-link { background: none; border: none; color: var(--purple-light); cursor: pointer; font-size: 0.88rem; text-decoration: underline; padding: 0; }
    .text-link:hover { color: var(--pink); }

    .divider { text-align: center; color: var(--muted); font-size: 0.85rem; margin: 18px 0; }
    .switch-row { text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.88rem; }
    .forgot-row { text-align: right; margin-top: -8px; margin-bottom: 16px; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }
    footer a { color: var(--muted); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo"><span class="logo-icon">⚡</span> ShortsForgeAI</a>
  <div class="nav-links">
    <a href="/#how-it-works">How It Works</a>
    <a href="/#pricing">Pricing</a>
    <a href="/#faq">FAQ</a>
  </div>
</nav>

<main>
  <div class="auth-card">

    <!-- SIGN IN / SIGN UP TABS -->
    <div id="loginSignupSection">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- SIGN IN -->
      <div class="form-section active" id="signinSection">
        <div class="msg" id="signinMsg"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signinEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signinPassword" placeholder="••••••••" />
        </div>
        <div class="forgot-row">
          <button class="text-link" onclick="showForgot()">Forgot password?</button>
        </div>
        <button class="btn-primary" id="signinBtn" onclick="doSignIn()">Sign In</button>
        <div class="switch-row">Don't have an account? <button class="text-link" onclick="switchTab('signup')">Sign Up</button></div>
      </div>

      <!-- SIGN UP -->
      <div class="form-section" id="signupSection">
        <div class="msg" id="signupMsg"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="signupBtn" onclick="doSignUp()">Create Account</button>
        <div class="switch-row">Already have an account? <button class="text-link" onclick="switchTab('signin')">Sign In</button></div>
      </div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotSection" style="display:none;">
      <h2>Reset Password</h2>
      <p class="subtitle">Enter your email and we'll send a reset link.</p>
      <div class="msg" id="forgotMsg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="forgotEmail" placeholder="you@example.com" />
      </div>
      <button class="btn-primary" id="forgotBtn" onclick="doForgot()">Send Reset Link</button>
      <div class="switch-row"><button class="text-link" onclick="hideForgot()">← Back to Sign In</button></div>
    </div>

  </div>
</main>

<footer>
  &copy; 2026 ShortsForgeAI &nbsp;·&nbsp; <a href="/">Home</a>
</footer>

<script>
  // ─── SUPABASE INIT ───────────────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://cqqukkvjjrguayiyjvhh.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcXVra3ZqanJndWF5aXlqdmhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTA0NjQsImV4cCI6MjA5MzIyNjQ2NH0.J7_kC3Y0SFnoNfumovmgRjI7YO6ZJrJfqYPG5NuMmeg';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ─── REDIRECT IF ALREADY LOGGED IN ──────────────────────────────────────────
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      const next = new URLSearchParams(location.search).get('next');
      location.href = next === 'pricing' ? '/#pricing' : '/dashboard.html';
    }
  });

  // ─── TAB SWITCH ─────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab==='signin'&&i===0)||(tab==='signup'&&i===1)));
    document.getElementById('signinSection').classList.toggle('active', tab==='signin');
    document.getElementById('signupSection').classList.toggle('active', tab==='signup');
  }

  // ─── FORGOT PASSWORD ────────────────────────────────────────────────────────
  function showForgot() {
    document.getElementById('loginSignupSection').style.display = 'none';
    document.getElementById('forgotSection').style.display = 'block';
  }
  function hideForgot() {
    document.getElementById('forgotSection').style.display = 'none';
    document.getElementById('loginSignupSection').style.display = 'block';
  }

  // ─── HELPERS ────────────────────────────────────────────────────────────────
  function setMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg(id) { const el = document.getElementById(id); el.className = 'msg'; el.textContent = ''; }
  function setLoading(btnId, loading, defaultText) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> Please wait…' : defaultText;
  }

  // ─── SIGN IN ────────────────────────────────────────────────────────────────
  async function doSignIn() {
    clearMsg('signinMsg');
    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;
    if (!email || !password) return setMsg('signinMsg', 'Please fill in all fields.', 'error');
    setLoading('signinBtn', true, 'Sign In');
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('signinBtn', false, 'Sign In');
    if (error) return setMsg('signinMsg', error.message, 'error');
    location.href = '/dashboard.html';
  }

  // ─── SIGN UP ────────────────────────────────────────────────────────────────
  async function doSignUp() {
    clearMsg('signupMsg');
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    if (!name || !email || !password) return setMsg('signupMsg', 'Please fill in all fields.', 'error');
    if (password.length < 6) return setMsg('signupMsg', 'Password must be at least 6 characters.', 'error');
    if (password !== confirm) return setMsg('signupMsg', 'Passwords do not match.', 'error');
    setLoading('signupBtn', true, 'Create Account');
    const { error } = await sb.auth.signUp({ email, password, options: { data: { name } } });
    setLoading('signupBtn', false, 'Create Account');
    if (error) return setMsg('signupMsg', error.message, 'error');
    setMsg('signupMsg', '✅ Account created! Check your email to confirm, then sign in.', 'success');
  }

  // ─── FORGOT PASSWORD ────────────────────────────────────────────────────────
  async function doForgot() {
    clearMsg('forgotMsg');
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) return setMsg('forgotMsg', 'Please enter your email.', 'error');
    setLoading('forgotBtn', true, 'Send Reset Link');
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + '/auth.html' });
    setLoading('forgotBtn', false, 'Send Reset Link');
    if (error) return setMsg('forgotMsg', error.message, 'error');
    setMsg('forgotMsg', '✅ Reset link sent! Check your inbox.', 'success');
  }

  // ─── ENTER KEY SUPPORT ───────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('signinSection').classList.contains('active')) doSignIn();
    else if (document.getElementById('signupSection').classList.contains('active')) doSignUp();
  });
</script>
</body>
</html>
